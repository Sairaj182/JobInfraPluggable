spring.datasource.url=jdbc:postgresql://localhost:5432/jobinfra
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

jobinfra.webhook.secret=${JOBINFRA_WEBHOOK_SECRET:default_secret_please_change}
jobinfra.webhook.timeoutMs=${JOBINFRA_WEBHOOK_TIMEOUT_MS:5000}

# Landing Page Configuration
jobinfra.app.name=JobInfra Cloud
jobinfra.app.version=${JOBINFRA_APP_VERSION:v1.0.0}
jobinfra.github.url=https://github.com/sairaj/jobinfra
jobinfra.docs.url=/swagger-ui/index.html
jobinfra.base-url=${JOBINFRA_BASE_URL:https://api.jobinfra.dev}
